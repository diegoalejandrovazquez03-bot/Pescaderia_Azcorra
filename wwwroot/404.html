<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0; url=./" />
  <script>
    // Preserve the original path using hash for SPA routing
    const originalPath = window.location.pathname + window.location.search + window.location.hash;
    if (originalPath && originalPath !== '/' && !originalPath.endsWith('.html')) {
      // Redirect to root with hash indicating the original route
      window.location.replace('/#' + encodeURIComponent(originalPath));
    } else {
      window.location.replace('/');
    }
  </script>
  <title>Redirecting...</title>
</head>
<body>
  <p>Redirecting to the home page...</p>
</body>
</html>
